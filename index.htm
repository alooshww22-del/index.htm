//  MAIN APP
// ══════════════════════════════════════════════════════════════
function AppInner(){
  const[lessons,setLessons]=useState(INIT_LESSONS);
  const[results,setResults]=useState([]);
  const[profiles,setProfiles]=useState([]);
  const[loading,setLoading]=useState(true);
  const[fbOk,setFbOk]=useState(false);
  const[fbStatus,setFbStatus]=useState("checking"); // checking|ok|offline

  const[screen,setScreen]=useState("home");
  const[activeProfile,setActiveProfile]=useState(null);
  const[lesson,setLesson]=useState(null);
  const[mode,setMode]=useState(null);
  const[lastRes,setLastRes]=useState(null);
  const[newBadges,setNewBadges]=useState([]);
  const[quizKey,setQuizKey]=useState(0);
  const[useTimer,setUseTimer]=useState(false);
  const[quizStartTime,setQuizStartTime]=useState(0);
  const[showParent,setShowParent]=useState(false);
  const[showTeacher,setShowTeacher]=useState(false);
  const[showWinner,setShowWinner]=useState(false);
  const[showVoice,setShowVoice]=useState(false);
  const[editingProfile,setEditingProfile]=useState(null);
  const[pinTarget,setPinTarget]=useState(null);
  const[pwPrompt,setPwPrompt]=useState(null);
  const[pw,setPw]=useState("");
  const[pwErr,setPwErr]=useState("");

  // ── Save to Firebase or localStorage ──────
  const saveShared=async(key,val)=>{
    LS.set(key,val); // save full data locally
    if(!fbOk) return;
    try {
      let toSave=val;
      if(key===KEYS.lessons){
        // ضغط الصور قبل الحفظ في Firebase
        toSave=await Promise.all(val.map(l=>compressLesson(l)));
      }
      if(key===KEYS.profiles){
        // ضغط صور الملفات الشخصية قبل الحفظ
        toSave=await Promise.all(val.map(async p=>({
          name:p.name,
          pin:p.pin||"",
          photo: await compressImage(p.photo,350,0.8),
        })));
      }
      await fbSet("app_data",key,{data:toSave,ts:Date.now()});
    } catch(e){ console.log("Firebase error:",e); }
  };

  // ── Load & sync ───────────────────────────
  useEffect(()=>{
    initVoices();
    initOneSignal();
    try{ const sv=localStorage.getItem("rawda_voice"); if(sv)_selVoice=sv; }catch(e){}

    async function init(){
      const ok=await checkFirebase();
      setFbOk(ok);
      setFbStatus(ok?"ok":"offline");

      if(ok){
        // Load from Firebase — each key in its own document
        const [ld,rd,pd]= await Promise.all([
          fbGet("app_data",KEYS.lessons),
          fbGet("app_data",KEYS.results),
          fbGet("app_data",KEYS.profiles),
        ]);
        if(ld?.data?.length>0){
          let loaded=ld.data;
          // تأكد إن درس الأرقام موجود دائماً
          if(!loaded.find(l=>l.id==="MATH")){
            loaded=[INIT_LESSONS[0],...loaded];
          }
          setLessons(loaded); LS.set(KEYS.lessons,loaded);
        }
        else { const l=LS.get(KEYS.lessons,INIT_LESSONS); setLessons(l); }
        if(rd?.data){ setResults(rd.data); LS.set(KEYS.results,rd.data); }
        if(pd?.data){ setProfiles(pd.data); LS.set(KEYS.profiles,pd.data); }
        else { const p=LS.get(KEYS.profiles,[]); setProfiles(p); }
      } else {
        const l=LS.get(KEYS.lessons,null);
        const r=LS.get(KEYS.results,[]);
        const p=LS.get(KEYS.profiles,[]);
        let lessonsToUse=l?.length>0?l:INIT_LESSONS;
        // تأكد إن درس الأرقام موجود
        if(!lessonsToUse.find(x=>x.id==="MATH")){
          lessonsToUse=[INIT_LESSONS[0],...lessonsToUse];
        }
        setLessons(lessonsToUse);
        setResults(r);setProfiles(p);
      }
      setLoading(false);
    }
    init();

    // Poll Firebase every 8s for live updates
    const poll=setInterval(async()=>{
      if(!fbOk)return;
      try{
        const [ld,rd,pd]=await Promise.all([
          fbGet("app_data",KEYS.lessons),
          fbGet("app_data",KEYS.results),
          fbGet("app_data",KEYS.profiles),
        ]);
        if(ld?.data?.length>0)setLessons(ld.data);
        if(rd?.data)setResults(rd.data);
        if(pd?.data)setProfiles(pd.data);
      }catch(e){}
    },8000);
    return()=>clearInterval(poll);
  },[]);

  // ── Derived ───────────────────────────────
  const activeLesson=lessons.find(l=>l.active&&l.id!=="MATH")||null;
  const activeMathLesson=lessons.find(l=>l.id==="MATH"&&l.active)||null;
  const myR=results.filter(r=>r.student===activeProfile?.name);
  const totalStars=myR.reduce((s,r)=>s+calcStars(r.pct),0);
  const earnedBadges=BADGES.filter(b=>b.req(myR));
  const lessonBest=(lid,m)=>myR.filter(r=>r.lessonId===lid&&r.mode===m).reduce((b,r)=>(!b||r.pct>b.pct)?r:b,null);
  const hasResults=results.some(r=>r.dateISO===todayISO());

  // ── Profile actions ───────────────────────
  const selectProfile=(p)=>{
    if(p.pin)setPinTarget(p);
    else{
      setActiveProfile(p);
      setScreen("lessons");
      // انتظر حتى يتحمل الصوت بعدين اتكلم
      setTimeout(()=>{
        loadVoices();
        setTimeout(()=>speak(`أهلاً وسهلاً ${p.name}`),500);
      },300);
    }
  };
  const pinSuccess=()=>{
    setActiveProfile(pinTarget);
    setPinTarget(null);
    setScreen("lessons");
    const name=pinTarget.name;
    setTimeout(()=>{
      loadVoices();
      setTimeout(()=>speak(`أهلاً وسهلاً ${name}`),500);
    },300);
  };
  const saveProfile=async(p)=>{
    const isNew=!profiles.find(x=>x.name===p.name);
    const updated=isNew?[...profiles,p]:profiles.map(x=>x.name===p.name?p:x);
    setProfiles(updated);await saveShared(KEYS.profiles,updated);
    if(activeProfile?.name===p.name)setActiveProfile(p);
    setEditingProfile(null);
  };
  const deleteProfile=async(name)=>{
    if(!window.confirm(`حذف ملف ${name}؟`))return;
    const updated=profiles.filter(p=>p.name!==name);
    setProfiles(updated);await saveShared(KEYS.profiles,updated);
    if(activeProfile?.name===name){setActiveProfile(null);setScreen("home");}
  };

  // ── Quiz actions ──────────────────────────
  const startQuiz=(l,m)=>{setLesson(l);setMode(m);setQuizKey(k=>k+1);setQuizStartTime(nowMs());setScreen("quiz");};
  const finishQuiz=async(score,total,timeTaken)=>{
    const pct=Math.round((score/total)*100);
    const entry={student:activeProfile.name,lessonId:lesson.id,lessonTitle:lesson.title,mode,score,total,pct,timeTaken,dateISO:todayISO()};
    const updR=[...results,entry];
    const gained=BADGES.filter(b=>b.req(updR)&&!BADGES.filter(x=>x.req(results)).find(pb=>pb.id===b.id));
    if(gained.length)playTone("badge");
    setResults(updR);await saveShared(KEYS.results,updR);
    setNewBadges(gained);setLastRes({score,total,timeTaken});setScreen("result");
  };

  const openProtected=(type)=>{setPwPrompt(type);setPw("");setPwErr("");};
  const checkPw=()=>{
    if(pwPrompt==="teacher"&&pw==="alifa1qq"){setShowTeacher(true);setPwPrompt(null);return;}
    if(pwPrompt==="parent"&&pw==="1234"){setShowParent(true);setPwPrompt(null);return;}
    setPwErr("كلمة المرور خاطئة ❌");
  };

  // ══════════════════════════════════════════
  //  CSS
  // ══════════════════════════════════════════
  const css=`
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');

    .topbar-right{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .icon-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#8ecae6;padding:6px 10px;border-radius:9px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:11px;white-space:nowrap}

    .add-profile-btn{width:100%;padding:14px;background:rgba(249,199,79,0.07);border:2px dashed rgba(249,199,79,0.28);border-radius:14px;color:#f9c74f;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
    .home-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}

    /* LESSONS */
    .les-header{width:100%;max-width:540px;display:flex;align-items:center;justify-content:space-between;margin:10px 0 6px}
    .welcome-col h2{font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;gap:7px}
    .welcome-photo{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid rgba(249,199,79,0.4)}
    .welcome-col p{font-size:11px;color:#8ecae6}
    .stars-total{background:rgba(249,199,79,0.1);border:1px solid rgba(249,199,79,0.25);border-radius:99px;padding:5px 12px;font-size:13px;font-weight:700;color:#f9c74f}
    .today-lesson-banner{width:100%;max-width:540px;background:linear-gradient(135deg,rgba(249,199,79,0.12),rgba(243,114,44,0.12));border:1.5px solid rgba(249,199,79,0.3);border-radius:14px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:10px}
    .tlb-letter{width:40px;height:40px;border-radius:10px;background:rgba(249,199,79,0.2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#f9c74f;flex-shrink:0}
    .tlb-info strong{font-size:14px;color:#fff;display:block}

    .no-lesson-banner{width:100%;max-width:540px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:16px;text-align:center;color:#8ecae6;font-size:13px;margin-bottom:10px}

    .badge-tiny{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:99px;padding:4px 11px;display:flex;align-items:center;gap:4px;white-space:nowrap;font-size:11px;color:#e2e8f0;flex-shrink:0}
    .timer-toggle{width:100%;max-width:540px;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:11px;padding:9px 13px;margin-bottom:8px;cursor:pointer}

    .toggle-label{font-size:12px;color:#e2e8f0}
    .active-lesson-card{background:rgba(255,255,255,0.05);border:2px solid rgba(249,199,79,0.4);border-radius:18px;padding:13px 15px;width:100%;max-width:540px}
    .les-card-top{display:flex;align-items:center;gap:11px;margin-bottom:9px}
    .les-letter{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#f9c74f22,#f3722c22);border:2px solid #f9c74f33;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;color:#f9c74f;flex-shrink:0}
    .les-info h3{font-size:15px;font-weight:700;color:#fff}
    .les-info p{font-size:11px;color:#8ecae6}
    .les-modes{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .mode-btn{padding:9px 4px;border-radius:10px;border:1.5px solid rgba(255,255,255,0.09);background:rgba(255,255,255,0.04);color:#e2e8f0;font-size:11px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all 0.2s;text-align:center}
    .mode-btn:hover{background:rgba(255,255,255,0.1);border-color:#8ecae6}
    .mode-btn.done{border-color:#22c55e44;background:rgba(34,197,94,0.06);color:#4ade80}
    .mode-disabled{opacity:0.4;cursor:not-allowed!important}
    .pill-info{font-size:9px;display:block;margin-top:1px;opacity:0.8}
    /* QUIZ */
    .quiz-wrap{width:100%;max-width:480px}
    .back-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
    .btn-back{background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.09);color:#8ecae6;padding:6px 13px;border-radius:99px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px}
    .mode-tag{color:#f9c74f;font-size:12px;font-weight:700}
    .quiz-card{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);border-radius:22px;padding:18px 15px 24px}
    .prog-bar{height:6px;background:rgba(255,255,255,0.08);border-radius:99px;overflow:hidden;margin-bottom:6px}
    .prog-fill{height:100%;background:linear-gradient(90deg,#f9c74f,#f3722c);border-radius:99px;transition:width 0.4s ease}
    .q-count{color:#8ecae6;font-size:11px;text-align:center;margin-bottom:13px}
    .word-display{background:linear-gradient(135deg,#f9c74f10,#f3722c10);border:2px solid #f9c74f25;border-radius:15px;padding:16px;text-align:center;cursor:pointer;margin-bottom:10px;position:relative;transition:transform 0.15s}
    .word-display:hover{transform:scale(1.02)}
    .big-word{font-size:34px;font-weight:900;color:#f9c74f;display:block}
    .listen-badge{position:absolute;top:8px;left:9px;font-size:15px;opacity:0.5}
    .q-instruction{color:#cbd5e1;text-align:center;font-size:13px;margin-bottom:12px}
    .opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .opt-btn{background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.09);border-radius:13px;padding:0;font-size:42px;cursor:pointer;transition:all 0.18s;display:flex;align-items:center;justify-content:center;min-height:120px;overflow:hidden;position:relative}
    .opt-btn:hover{background:rgba(255,255,255,0.1);border-color:#8ecae6;transform:scale(1.04)}
    .opt-btn.correct{background:#22c55e18;border-color:#22c55e;animation:pulse-ok 0.4s ease}
    .opt-btn.wrong{background:#ef444418;border-color:#ef4444;animation:shake-h 0.4s ease}
    @keyframes pulse-ok{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
    @keyframes shake-h{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
    /* DICTATION */
    .dict-hint-area{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:10px}
    .sound-btns{display:flex;gap:6px}
    .snd-btn{background:rgba(249,199,79,0.1);border:1.5px solid #f9c74f38;color:#f9c74f;padding:7px 14px;border-radius:99px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px}
    .snd-btn.slow{color:#8ecae6;border-color:#8ecae638;background:rgba(142,202,220,0.07)}
    .hw-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
    .hw-hint{color:#8ecae6;font-size:13px;text-align:center}
    .hw-canvas{width:100%;height:160px;background:rgba(0,0,0,0.3);border:2px solid rgba(249,199,79,0.3);border-radius:14px;cursor:crosshair;touch-action:none;display:block}
    .hw-btns{display:flex;gap:10px;width:100%}
    .hw-btn{flex:1;padding:11px;border-radius:11px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700}
    .hw-btn.clear{background:rgba(239,68,68,0.12);border:1.5px solid rgba(239,68,68,0.3);color:#f87171}
    .hw-btn.submit{background:linear-gradient(135deg,#f9c74f,#f3722c);color:#1a1a2e}
    .check-phase{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
    .check-label{color:#8ecae6;font-size:12px}
    .drawn-img{width:100%;max-width:340px;height:110px;object-fit:contain;background:rgba(0,0,0,0.3);border:1.5px solid rgba(255,255,255,0.1);border-radius:10px}
    .correct-word-show{font-size:44px;font-weight:900;color:#f9c74f;margin:4px 0}
    .check-q{color:#e2e8f0;font-size:15px;font-weight:700}
    .self-check-btns{display:flex;gap:10px;width:100%}
    .sc-btn{flex:1;padding:13px;border-radius:12px;border:none;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:900}
    .sc-btn.yes{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
    .sc-btn.no{background:rgba(239,68,68,0.15);border:2px solid rgba(239,68,68,0.3);color:#f87171}
    /* ANALYSIS */
    .analysis-img-area{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:12px}
    .analysis-main-img{width:110px;height:110px;object-fit:cover;border-radius:16px;border:2px solid rgba(249,199,79,0.35)}
    .arrange-display{min-height:70px;background:rgba(255,255,255,0.04);border:2px dashed rgba(249,199,79,0.35);border-radius:13px;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px;padding:10px 14px;transition:all 0.2s}
    .arrange-display.slots-ok{border-color:#22c55e;border-style:solid;background:#22c55e10}
    .arrange-display.slots-err{border-color:#ef4444;border-style:solid;background:#ef444410}
    .connected-word{font-size:32px;font-weight:900;color:#f9c74f;font-family:'Tajawal',sans-serif;direction:rtl;display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
    .conn-char{cursor:pointer;padding:2px 1px;border-radius:4px;transition:color 0.15s}
    .conn-char:hover{color:#f87171}
    .del-last-btn{background:rgba(239,68,68,0.12);border:1.5px solid rgba(239,68,68,0.3);color:#f87171;width:36px;height:36px;border-radius:99px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .slot-placeholder{font-size:13px;color:rgba(255,255,255,0.25)}
    .letter-tiles-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0}
    .letter-tile{border-radius:12px;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,0.18);color:#fff;cursor:pointer;font-family:'Tajawal',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.15s;padding:6px 10px;min-width:48px}
    .letter-tile:hover{background:rgba(249,199,79,0.2);border-color:#f9c74f;transform:scale(1.1)}
    .letter-tile:active{transform:scale(0.93)}
    .connected-tile{background:rgba(255,255,255,0.06);border-color:rgba(249,199,79,0.35)}
    .tile-shape{font-size:24px;font-weight:900;color:#f9c74f;line-height:1.2}
    .tile-bare{font-size:10px;color:#8ecae6;margin-top:2px}
    .shake{animation:shake-h 0.45s ease}
    .feedback{margin-top:8px;padding:10px;border-radius:11px;text-align:center;font-size:14px;font-weight:700;margin-bottom:6px}
    .fb-ok{background:#22c55e15;color:#4ade80;border:1px solid #22c55e33}
    .fb-err{background:#ef444415;color:#f87171;border:1px solid #ef444433}
    /* RESULT */
    .result-screen{background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.09);border-radius:24px;padding:30px 20px;text-align:center;width:100%;max-width:400px;margin-top:10px}
    .star-big{font-size:36px;margin:0 2px;display:inline-block;animation:pop 0.5s ease both}
    @keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.3)}100%{transform:scale(1)}}
    .res-msg{font-size:24px;font-weight:900;color:#f9c74f;margin:8px 0 16px}
    .score-ring{width:90px;height:90px;border-radius:50%;border:3px solid #f9c74f48;background:linear-gradient(135deg,#f9c74f10,#f3722c10);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 16px}
    .ring-n{font-size:38px;font-weight:900;color:#f9c74f;line-height:1}
    .ring-t{font-size:13px;color:#8ecae6}
    .badges-earned{background:rgba(249,199,79,0.07);border:1px solid rgba(249,199,79,0.2);border-radius:13px;padding:12px;margin-bottom:12px}
    .badges-title{color:#f9c74f;font-size:14px;font-weight:700;margin-bottom:7px;text-align:center}
    .badge-card{display:flex;align-items:center;gap:9px;padding:6px 0}

    /* WINNER */
    .winner-hero{background:linear-gradient(135deg,rgba(249,199,79,0.15),rgba(243,114,44,0.1));border:2px solid rgba(249,199,79,0.4);border-radius:20px;padding:20px;text-align:center;margin-bottom:14px;position:relative}
    .winner-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:3px solid #f9c74f;margin:0 auto 8px;display:block}
    .winner-avatar{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,0.1);border:3px solid #f9c74f;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:32px}

    .wstat-n{font-size:18px;font-weight:900;color:#f9c74f}
    .wstat-l{font-size:10px;color:#8ecae6}
    .lb-table-header{display:flex;align-items:center;gap:6px;padding:6px 10px;border-bottom:1.5px solid rgba(255,255,255,0.1);font-size:11px;color:#8ecae6;font-weight:700;margin-bottom:4px}

    .lb-medal{font-size:20px;width:32px;text-align:center;flex-shrink:0}
    .lb-student{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
    .lb-avatar{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center}

    .lb-cell{width:46px;text-align:center;font-size:13px;font-weight:700;color:#e2e8f0;flex-shrink:0}
    /* BUTTONS */
    .btn-primary{display:block;width:100%;margin-top:12px;padding:14px;background:linear-gradient(135deg,#f9c74f,#f3722c);border:none;border-radius:12px;font-size:16px;font-weight:900;color:#1a1a2e;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all 0.2s}
    .btn-primary:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 24px rgba(249,199,79,0.3)}

    .btn-next{display:block;width:100%;margin-top:12px;padding:14px;background:linear-gradient(135deg,#4a9ec5,#219ebc);border:none;border-radius:12px;font-size:16px;font-weight:900;color:#fff;cursor:pointer;font-family:'Tajawal',sans-serif}
    .btn-ghost{display:block;width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(255,255,255,0.11);border-radius:12px;font-size:14px;font-weight:700;color:#e2e8f0;cursor:pointer;font-family:'Tajawal',sans-serif}
    /* PIN */
    .pin-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
    .pin-box{background:#0e1420;border:1.5px solid rgba(255,255,255,0.12);border-radius:24px;padding:28px 22px;width:100%;max-width:300px;text-align:center;position:relative}

    .photo-circle{width:80px;height:80px;border-radius:50%;border:3px dashed rgba(249,199,79,0.4);background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;margin:0 auto;cursor:pointer;overflow:hidden}

    .close-btn{background:rgba(255,255,255,0.07);border:none;color:#8ecae6;width:30px;height:30px;border-radius:99px;cursor:pointer;font-size:14px}

    .lr-info{flex:1}.lr-info strong{font-size:13px;color:#fff}.lr-info p{font-size:11px;color:#8ecae6;margin-top:1px}
    .del-btn{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.22);color:#f87171;padding:5px 9px;border-radius:7px;cursor:pointer;font-size:12px;flex-shrink:0}
    .parent-tip{background:rgba(99,179,237,0.07);border:1px solid rgba(99,179,237,0.18);border-radius:10px;padding:11px;font-size:12px;color:#e2e8f0;line-height:1.6}
    .parent-tip strong{color:#63b3ed;display:block;margin-bottom:2px}
    .badges-grid{display:flex;flex-wrap:wrap;gap:5px}
    .badge-pill{background:rgba(249,199,79,0.09);border:1px solid rgba(249,199,79,0.22);color:#f9c74f;padding:4px 10px;border-radius:99px;font-size:11px;display:flex;align-items:center;gap:3px}
    .empty-msg{color:#8ecae6;text-align:center;padding:20px;font-size:13px}
    .panel-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,0.07);overflow-x:auto}
    .tab-btn{flex:1;padding:10px;background:none;border:none;color:#8ecae6;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:11px;font-weight:700;border-bottom:2px solid transparent;white-space:nowrap;min-width:60px}
    .tab-btn.active{color:#f9c74f;border-bottom-color:#f9c74f}
    .field-label{color:#8ecae6;font-size:12px;margin-bottom:3px;display:block}
    .panel-input{width:100%;padding:9px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:9px;color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;outline:none;direction:rtl;margin-bottom:7px}
    .panel-input:focus{border-color:#f9c74f}
    .panel-msg{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.22);color:#4ade80;padding:8px;border-radius:8px;text-align:center;font-size:12px}
    .add-word-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px}
    .img-pick-box{background:rgba(255,255,255,0.06);border:2px dashed rgba(249,199,79,0.3);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;font-size:20px;color:#8ecae6;border-radius:10px;transition:border-color 0.2s;text-align:center}
    .img-pick-box:hover{border-color:#f9c74f}
    .img-pick-box small{font-size:9px;color:#8ecae6;margin-top:2px;display:block}
    .img-choice-popup{position:absolute;top:100%;right:0;background:#1a2744;border:1.5px solid rgba(249,199,79,0.3);border-radius:12px;padding:8px;z-index:50;display:flex;flex-direction:column;gap:6px;min-width:150px;margin-top:4px}
    .img-choice-popup button{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#e2e8f0;padding:8px 12px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;text-align:right}
    .img-choice-popup button:hover{background:rgba(255,255,255,0.12)}
    .activate-hint{background:rgba(249,199,79,0.08);border:1px solid rgba(249,199,79,0.2);border-radius:10px;padding:10px 12px;font-size:12px;color:#f9c74f;line-height:1.5}
    .lesson-activate-row{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.04);border-radius:10px;padding:9px;border:1.5px solid transparent;transition:all 0.2s}
    .lesson-activate-row.row-active{background:rgba(249,199,79,0.08);border-color:rgba(249,199,79,0.35)}
    .activate-btn{padding:7px 14px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#8ecae6;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;transition:all 0.2s}
    .activate-btn.active-on{background:rgba(34,197,94,0.15);border-color:#22c55e;color:#4ade80}
    .no-active-hint{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);border-radius:10px;padding:10px;text-align:center;color:#f87171;font-size:13px}
    .stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
    .stat-card{background:rgba(255,255,255,0.04);border-radius:11px;padding:12px 6px;text-align:center;display:flex;flex-direction:column;gap:2px}
    .stat-n{font-size:18px;font-weight:900;color:#f9c74f}
    .stat-l{font-size:10px;color:#8ecae6}
    .chart-section{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:11px;margin-bottom:8px}
    .section-title{font-size:13px;font-weight:700;color:#f9c74f;margin-bottom:8px}
    .bar-chart{display:flex;gap:6px;align-items:flex-end;height:80px}
    .bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
    .bar-wrap{height:60px;width:100%;display:flex;align-items:flex-end;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden}
    .bar-fill{width:100%;border-radius:4px 4px 0 0;min-height:3px}
    .bar-label{font-size:9px;color:#e2e8f0;font-weight:700}
    .bar-day{font-size:8px;color:#8ecae6}
    /* VOICE */
    .voice-row{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1.5px solid rgba(255,255,255,0.08);border-radius:11px;padding:10px 12px;cursor:pointer;transition:all 0.2s}
    .voice-row:hover{background:rgba(255,255,255,0.09);border-color:#8ecae6}
    .voice-row.voice-selected{background:rgba(249,199,79,0.1);border-color:rgba(249,199,79,0.4)}
    .voice-info{flex:1;display:flex;flex-direction:column;gap:2px}
    .voice-info strong{font-size:13px;color:#fff}
    .voice-info span{font-size:11px;color:#8ecae6}
    .voice-test-btn{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#8ecae6;padding:5px 10px;border-radius:7px;cursor:pointer;font-size:12px;white-space:nowrap;flex-shrink:0;font-family:'Tajawal',sans-serif}
    .voice-test-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
    .voice-check{color:#22c55e;font-size:18px;font-weight:900;flex-shrink:0}
    /* PASSWORD */
    .pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
    .pw-box{background:#111827;border:1.5px solid rgba(255,255,255,0.12);border-radius:18px;padding:24px;width:100%;max-width:290px;text-align:center}
    .pw-box h3{color:#f9c74f;font-size:16px;margin-bottom:12px}
    .pw-input{width:100%;padding:11px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-family:'Tajawal',sans-serif;font-size:20px;text-align:center;outline:none;letter-spacing:6px;margin-bottom:5px}
    .pw-err{color:#f87171;font-size:12px;margin-bottom:8px;display:block}
    .pw-row{display:flex;gap:7px}
    .pw-ok{flex:1;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#f9c74f,#f3722c);color:#1a1a2e;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
    .pw-cancel{flex:1;padding:10px;border-radius:10px;border:none;background:rgba(255,255,255,0.07);color:#8ecae6;font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer}
    .pos-option-btn{padding:14px 8px;border-radius:14px;border:2px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.05);color:#e2e8f0;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.18s;text-align:center}
    .pos-option-btn:hover{background:rgba(255,255,255,0.12);border-color:#8ecae6;transform:scale(1.05)}
    .pos-option-btn.pos-correct{background:#22c55e18;border-color:#22c55e;color:#4ade80;animation:pulse-ok 0.4s ease}
    .pos-option-btn.pos-wrong{background:#ef444418;border-color:#ef4444;color:#f87171}
    @keyframes spin{to{transform:rotate(360deg)}}
  `;

  if(loading){
    return(
      <>
        <style>{css}</style>
        <div style={{minHeight:"100vh",background:"#07090f",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"Tajawal,sans-serif",direction:"rtl"}}>
          <div style={{width:48,height:48,border:"4px solid rgba(249,199,79,0.2)",borderTop:"4px solid #f9c74f",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>
          <p style={{color:"#8ecae6",fontSize:14}}>جاري التحميل...</p>
          <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
        </div>
      </>
    );
  }

  return(
    <>
      <style>{css}</style>
      <div className="app">

        {pinTarget&&<PinPad title={`🔐 أدخل رمز ${pinTarget.name}`} savedPin={pinTarget.pin} onSuccess={pinSuccess} onCancel={()=>setPinTarget(null)}/>}

        {pwPrompt&&(
          <div className="pw-overlay">
            <div className="pw-box">
              <h3>🔐 {pwPrompt==="teacher"?"المعلمة":"الأهل"}</h3>
              <input type="password" className="pw-input" value={pw} onChange={e=>{setPw(e.target.value);setPwErr("");}} onKeyDown={e=>e.key==="Enter"&&checkPw()} placeholder="••••" autoFocus/>
              {pwErr&&<span className="pw-err">{pwErr}</span>}
              <div className="pw-row">
                <button className="pw-ok" onClick={checkPw}>دخول</button>
                <button className="pw-cancel" onClick={()=>setPwPrompt(null)}>إلغاء</button>
              </div>
            </div>
          </div>
        )}

        {showParent&&<ParentReport results={results} profiles={profiles} lessons={lessons} onClose={()=>setShowParent(false)}/>}
        {showTeacher&&<TeacherPanel lessons={lessons} setLessons={setLessons} results={results} profiles={profiles} fbOk={fbOk} saveShared={saveShared} onClose={()=>setShowTeacher(false)}/>}
        {showWinner&&<DailyWinnerScreen results={results} profiles={profiles} onClose={()=>setShowWinner(false)}/>}
        {showVoice&&<VoiceSettings onClose={()=>setShowVoice(false)}/>}
        {editingProfile!==null&&<EditProfile profile={editingProfile.name?editingProfile:null} onSave={saveProfile} onCancel={()=>setEditingProfile(null)}/>}

        {/* TOP BAR */}
        <div className="topbar">
          <div className="brand-col">
            <span className="brand-sub">روضة</span>
            <span className="brand-main">عالم الذكاء 🌟</span>
          </div>
          <div className="topbar-right">
            <span className={`fb-badge ${fbOk?"fb-ok":"fb-off"}`}>{fbOk?"🌐":"💾"}</span>
            {activeProfile&&screen!=="home"&&(
              <div className="active-chip" onClick={()=>setScreen("home")}>
                {activeProfile.photo?<img src={activeProfile.photo} alt="" className="chip-photo"/>:<span>👦</span>}
                {activeProfile.name}
              </div>
            )}
            {hasResults&&<button className="icon-btn trophy" onClick={()=>setShowWinner(true)}>🏆</button>}
            <button className="icon-btn" onClick={()=>openProtected("parent")}>📊</button>
            <button className="icon-btn" onClick={()=>openProtected("teacher")}>🎓</button>
            <button className="icon-btn" onClick={()=>setShowVoice(true)}>🔊</button>
          </div>
        </div>

        {/* HOME */}
        {screen==="home"&&(
          <div className="home-screen">
            <h1 className="home-title">🌟 عالم الذكاء</h1>
            <p className="home-sub">اختر ملفك لتبدأ</p>
            {!fbOk&&FB.projectId.includes("اسم-مشروعك")&&(
              <div style={{background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:12,padding:10,marginBottom:12,textAlign:"center",fontSize:12,color:"#f87171"}}>
                ⚠️ Firebase غير مُعد — البيانات محلية فقط<br/>
                <span style={{color:"#8ecae6"}}>اتبعي تعليمات الإعداد في الكود</span>
              </div>
            )}
            <div className="profiles-grid">
              {profiles.map(p=>{
                const pr=results.filter(r=>r.student===p.name);
                const stars=pr.reduce((s,r)=>s+calcStars(r.pct),0);
                return(
                  <div key={p.name} className="profile-card" onClick={()=>selectProfile(p)}>
                    <button className="pc-del" onClick={e=>{e.stopPropagation();deleteProfile(p.name);}}>✕</button>
                    {p.photo?<img src={p.photo} alt="" className="pc-photo"/>:<div className="pc-no-photo">👦</div>}
                    <p className="pc-name">{p.name}</p>
                    <p className="pc-sub">{p.pin?"🔐 ":""}{stars>0?`⭐ ${stars}`:"ابدأ الآن"}</p>
                  </div>
                );
              })}
            </div>
            <button className="add-profile-btn" onClick={()=>setEditingProfile({})}>+ إضافة طفل جديد</button>
            <div className="home-actions">
              {hasResults&&<button className="home-action-btn" onClick={()=>setShowWinner(true)}>🏆 نتائج اليوم</button>}
              <button className="home-action-btn" onClick={()=>openProtected("parent")}>📊 تقرير الأهل</button>
            </div>
          </div>
        )}

        {/* LESSONS */}
        {screen==="lessons"&&activeProfile&&(
          <>
            <div className="les-header">
              <div className="welcome-col">
                <h2>{activeProfile.photo&&<img src={activeProfile.photo} alt="" className="welcome-photo"/>}{activeProfile.name}!</h2>
                <p>درس اليوم</p>
              </div>
              {totalStars>0&&<span className="stars-total">⭐ {totalStars}</span>}
            </div>
            {earnedBadges.length>0&&<div className="badges-strip">{earnedBadges.map(b=><div key={b.id} className="badge-tiny"><span>{b.icon}</span><span>{b.label}</span></div>)}</div>}
            {activeLesson?(
              <div className="today-lesson-banner">
                <div className="tlb-letter">{activeLesson.letter}</div>
                <div className="tlb-info"><strong>{activeLesson.title}</strong><span>📅 درس اليوم</span></div>
              </div>
            ):(
              <div className="no-lesson-banner">⏳ المعلمة لم تفعّل درس اليوم بعد<br/>انتظر قليلاً!</div>
            )}
            {activeLesson&&(
              <>
                <div className="timer-toggle" onClick={()=>setUseTimer(t=>!t)}>
                  <div className="toggle-track" style={{background:useTimer?"#f9c74f":"rgba(255,255,255,0.13)"}}><div className="toggle-thumb" style={{right:useTimer?3:20}}/></div>
                  <span className="toggle-label">⏱️ وضع المؤقت</span>
                </div>
                <div className="active-lesson-card">
                  <div className="les-card-top">
                    <div className="les-letter">{activeLesson.letter||"؟"}</div>
                    <div className="les-info"><h3>{activeLesson.title}</h3><p>{activeLesson.words.length} كلمات</p></div>
                  </div>
                  <div className="les-modes">
                    {[
                      {m:"hunter",     icon:"🎯", label:"صياد الحروف", wk:"hunter"},
                      {m:"words",      icon:"📖", label:"اختر صورة",   wk:"wordsImg"},
                      {m:"dictation",  icon:"✍️",  label:"إملاء",       wk:"wordsDict"},
                      {m:"analysis",   icon:"🔤", label:"تحليل حروف",  wk:"wordsAna1"},
                      {m:"lettertype", icon:"🔡", label:"نوع الحرف",   wk:"wordsAna2"},
                      ...(activeLesson.mathCount?.length>0?[
                        {m:"mathcount",  icon:"🔢", label:"عدّ الأشياء", wk:"mathCount"},
                        {m:"mathdict",   icon:"✏️", label:"إملاء الأرقام", wk:"mathDict"},
                        {m:"mathunter",  icon:"🎮", label:"صياد الأرقام", wk:"mathHunter"},
                      ]:[]),
                    ].map(({m,icon,label,wk})=>{
                      const best=lessonBest(activeLesson.id,m);
                      const wordList=["hunter","ice","bubble"].includes(m)?[1]:
                        m==="mathcount"?(activeLesson.mathCount||[]):
                        m==="mathdict"?(activeLesson.mathDict||[]):
                        m==="mathunter"?[1]:
                        activeLesson[wk]||[];
                      const disabled=wordList.length===0;
                      return(
                        <button key={m} className={`mode-btn ${best?"done":""} ${disabled?"mode-disabled":""}`}
                          onClick={()=>!disabled&&startQuiz(activeLesson,m)}>
                          {icon} {label}
                          <span className="pill-info">{disabled?"أضف كلمات":best?`${best.score}/${best.total}⭐`:`${wordList.length} كلمات`}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </>
            )}

            {/* بطاقة الرياضيات منفصلة */}
            {activeMathLesson&&(
              <div className="active-lesson-card" style={{marginTop:10,border:"1.5px solid rgba(76,201,240,0.4)"}}>
                <div className="les-card-top">
                  <div className="les-letter" style={{background:"rgba(76,201,240,0.15)",border:"2px solid rgba(76,201,240,0.4)",color:"#4cc9f0",fontSize:22}}>🔢</div>
                  <div className="les-info"><h3>{activeMathLesson.title}</h3><p>أسئلة الرياضيات</p></div>
                </div>
                <div className="les-modes">
                  {[
                    {m:"mathcount", icon:"🍎", label:"عدّ الأشياء"},
                    {m:"mathdict",  icon:"✏️", label:"إملاء الأرقام"},
                    {m:"mathunter", icon:"🎯", label:"صياد الأرقام"},
                  ].map(({m,icon,label})=>{
                    const best=lessonBest(activeMathLesson.id,m);
                    const cnt=m==="mathcount"?(activeMathLesson.mathCount||[]).length:m==="mathdict"?(activeMathLesson.mathDict||[]).length:1;
                    return(
                      <button key={m} className={`mode-btn ${best?"done":""}`}
                        onClick={()=>startQuiz(activeMathLesson,m)}>
                        {icon} {label}
                        <span className="pill-info">{best?`${best.score}/${best.total}⭐`:`${m==="mathunter"?"العب":cnt+" رقم"}`}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </>
        )}

        {/* QUIZ */}
        {screen==="quiz"&&lesson&&(
          <div className="quiz-wrap">
            <div className="back-row">
              <button className="btn-back" onClick={()=>setScreen("lessons")}>← رجوع</button>
              <span className="mode-tag">{lesson.title} — {mode==="words"?"📖":mode==="dictation"?"✍️":"🔤"}</span>
            </div>
            {mode==="words"      &&<WordQuiz         key={quizKey} words={lesson.wordsImg ||lesson.words||[]} onFinish={finishQuiz} useTimer={useTimer} startTime={quizStartTime}/>}
            {mode==="dictation"  &&<DictationQuiz    key={quizKey} words={lesson.wordsDict||lesson.words||[]} onFinish={finishQuiz} useTimer={useTimer} startTime={quizStartTime}/>}
            {mode==="analysis"   &&<AnalysisQuiz     key={quizKey} words={lesson.wordsAna1||lesson.words||[]} onFinish={finishQuiz} useTimer={useTimer} startTime={quizStartTime}/>}
            {mode==="lettertype" &&<LetterTypeQuiz   key={quizKey} words={lesson.wordsAna2||lesson.extraWords||[]} onFinish={finishQuiz} useTimer={useTimer} startTime={quizStartTime}/>}
            {mode==="hunter"     &&<LetterHunterQuiz key={quizKey} targetLetter={lesson.letter||"م"} onFinish={finishQuiz} startTime={quizStartTime}/>}
            {mode==="mathcount"  &&<CountingQuiz     key={quizKey} words={lesson.mathCount||[]} onFinish={finishQuiz} useTimer={useTimer} startTime={quizStartTime}/>}
            {mode==="mathdict"   &&<NumberDictationQuiz key={quizKey} words={lesson.mathDict||[]} onFinish={finishQuiz} useTimer={useTimer} startTime={quizStartTime}/>}
            {mode==="mathunter"  &&<NumberHunterQuiz key={quizKey} targetNumber={lesson.mathHunter||3} onFinish={finishQuiz} startTime={quizStartTime}/>}
          </div>
        )}

        {/* RESULT */}
        {screen==="result"&&lastRes&&(
          <ResultScreen
            score={lastRes.score} total={lastRes.total} timeTaken={lastRes.timeTaken} newBadges={newBadges}
            onRetry={()=>{setQuizKey(k=>k+1);setNewBadges([]);setScreen("quiz");}}
            onBack={()=>{setNewBadges([]);setScreen("lessons");}}
          />
        )}
      </div>
    </>
  );
}

function App(){
  return <ErrorBoundary><AppInner/></ErrorBoundary>;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
